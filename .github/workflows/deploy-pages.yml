name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dapps
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dapps/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          GITHUB_PAGES: "true"
          VITE_EVE_WORLD_PACKAGE_ID: "0x28b497559d65ab320d9da4613bf2498d5946b2c0ae3597ccfda3072ce127448c"
          VITE_SUI_GRAPHQL_ENDPOINT: "https://graphql.testnet.sui.io/graphql"
          VITE_JOB_ESCROW_PACKAGE_ID: "0x3be0da6286dbd68ed6dc2dec9c5fb65dd43764bb77705f0d9b4cdd0ce76d25df"
          VITE_JOB_ESCROW_PLATFORM_ID: "0x4d8557e1963936480170ce69ede15f041635fd4d865be8c1bc86ac6b1b335997"
          VITE_BOUNTY_ESCROW_PACKAGE_ID: "0xc641918fe45409dc54ebb7e2e3e22401f2a44361c3b16c3ad80ef1166f98751c"
          VITE_BOUNTY_ESCROW_PLATFORM_ID: "0x11cadbfe5cd5990c9568b0a2f56825994a372ff2dc911d6559612c61e6986d61"
          VITE_INTEL_MARKET_PACKAGE_ID: "0xee5d88423ee7bf5ffd91887007d940120781695624b5571e42b9c387de9faf19"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dapps/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
