name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    defaults:
      run:
        working-directory: dapps
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dapps/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          GITHUB_PAGES: "true"
          VITE_EVE_WORLD_PACKAGE_ID: ${{ vars.VITE_EVE_WORLD_PACKAGE_ID }}
          VITE_SUI_GRAPHQL_ENDPOINT: ${{ vars.VITE_SUI_GRAPHQL_ENDPOINT }}
          VITE_JOB_ESCROW_PACKAGE_ID: ${{ vars.VITE_JOB_ESCROW_PACKAGE_ID }}
          VITE_JOB_ESCROW_PLATFORM_ID: ${{ vars.VITE_JOB_ESCROW_PLATFORM_ID }}
          VITE_BOUNTY_ESCROW_PACKAGE_ID: ${{ vars.VITE_BOUNTY_ESCROW_PACKAGE_ID }}
          VITE_BOUNTY_ESCROW_PLATFORM_ID: ${{ vars.VITE_BOUNTY_ESCROW_PLATFORM_ID }}
          VITE_INTEL_MARKET_PACKAGE_ID: ${{ vars.VITE_INTEL_MARKET_PACKAGE_ID }}
          VITE_INTEL_BOUNTY_PACKAGE_ID: ${{ vars.VITE_INTEL_BOUNTY_PACKAGE_ID }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dapps/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
